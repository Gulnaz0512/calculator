<!DOCTYPE html>
<html lang="en" data-theme="theme-1">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator App</title>
  <link rel="stylesheet" href="css ff web.css" />
</head>
<body>
  <main class="calculator" aria-label="Calculator">
    <header class="top">
      <h1>calc</h1>

      <div class="theme-box">
        <span>THEME</span>
        <div>
          <div class="theme-numbers" aria-hidden="true">
            <span>1</span>
            <span>2</span>
            <span>3</span>
          </div>

          <div class="theme-toggle" role="radiogroup" aria-label="Choose color theme">
            <button class="theme-dot active" type="button" data-theme="theme-1" aria-label="Theme 1"></button>
            <button class="theme-dot" type="button" data-theme="theme-2" aria-label="Theme 2"></button>
            <button class="theme-dot" type="button" data-theme="theme-3" aria-label="Theme 3"></button>
          </div>
        </div>
      </div>
    </header>

    <section class="display" id="display" aria-live="polite">0</section>

    <section class="buttons">
      <button type="button" data-value="7">7</button>
      <button type="button" data-value="8">8</button>
      <button type="button" data-value="9">9</button>
      <button type="button" class="key-action" data-action="delete">DEL</button>

      <button type="button" data-value="4">4</button>
      <button type="button" data-value="5">5</button>
      <button type="button" data-value="6">6</button>
      <button type="button" data-operator="+">+</button>

      <button type="button" data-value="1">1</button>
      <button type="button" data-value="2">2</button>
      <button type="button" data-value="3">3</button>
      <button type="button" data-operator="-">-</button>

      <button type="button" data-value=".">.</button>
      <button type="button" data-value="0">0</button>
      <button type="button" data-operator="/">/</button>
      <button type="button" data-operator="*">x</button>

      <button type="button" class="key-action key-wide" data-action="reset">RESET</button>
      <button type="button" class="key-equal key-wide" data-action="calculate">=</button>
    </section>
  </main>

  <script src="js ff web (1).js"></script>
</body>
</html>
